data:
  source:    'example/example.csv'
  nickname:  'example_geodemo'
  id_col:    'ID'
  exclude_cols:
    - 'CL'
working_dir: 'scratch'
random_seed: 20210321
autoencoder:
  nickname:    'to4embk2_relu'
  version:     '0_1'
  save_latent: 'csv'
  max_epochs: 300
  batch_size: 0.01
  encoder:
    sizes:
      - 8
      - 4
    activation:   'ReLU'
    sparse:
      topk_k:     2
    loss_weights:
      latent_l1:  0.0
      covariance: 0.001
